<!-- https://github.com/DenverCoder1/readme-typing-svg/ -->
<svg xmlns='http://www.w3.org/2000/svg'
    xmlns:xlink='http://www.w3.org/1999/xlink'
    viewBox='0 0 768 100'
    style='background-color: #00000000;'
    width='768px' height='100px'>

    
    <path id='path0'>
        <animate id='d0' attributeName='d' dur='5100ms' fill="freeze"
            begin='0s;d2.end' keyTimes="0;0;0.98039215686275;1"
            values='m0,25 h0 ; m0,25 h0 ; m0,25 h768 ; m0,25 h768' />
    </path>
    <text font-family='"popins", monospace' fill='#F70000' font-size='20'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'>
        <textPath xlink:href='#path0'>
            Full Stack Web Developer 
        </textPath>
    </text>

    <path id='path1'>
        <animate id='d1' attributeName='d' dur='10200ms' fill="freeze"
            begin='0s;d2.end' keyTimes="0;0.5;0.99019607843137;1"
            values='m0,50 h0 ; m0,50 h0 ; m0,50 h768 ; m0,50 h768' />
    </path>
    <text font-family='"popins", monospace' fill='#F70000' font-size='20'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'>
        <textPath xlink:href='#path1'>
            PHP, HTML, CSS, REACT, NODE, MYSQL, MongoDB
        </textPath>
    </text>

    <path id='path2'>
        <animate id='d2' attributeName='d' dur='15300ms' fill="freeze"
            begin='0s;d2.end' keyTimes="0;0.66666666666667;0.99346405228758;1"
            values='m0,75 h0 ; m0,75 h0 ; m0,75 h768 ; m0,75 h768' />
    </path>
    <text font-family='"popins", monospace' fill='#F70000' font-size='20'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'>
        <textPath xlink:href='#path2'>
            Tech Lead @ SOOKH || UI/UX Specialist 
        </textPath>
    </text>

</svg>
